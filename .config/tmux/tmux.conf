set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g allow-passthrough on
set -g focus-events on
set-environment -gu TERM

unbind C-b
set -g prefix C-Space
bind-key C-Space send-prefix

unbind r
bind r source-file ~/.config/tmux/tmux.conf

if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"

# Set split pane using - and |
bind = split-window -v -c "#{pane_current_path}"
bind _ split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

set-option -g mouse on

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 100000

set-window-option -g mode-keys vi

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

set-window-option -g status-position top
set -g status-justify absolute-centre

set -g status-position top
set -g status-interval 5
set -g status-right-length 100
set -g status-left-length 100

set -g popup-border-lines "rounded"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}'| grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind-key C-t display-popup -d "#{pane_current_path}" -w 90% -h 90% -E
bind-key C-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind-key C-e display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi"
bind-key C-k display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "k9s"

BG="#1a1b26"
FG="#a8b1d6"
BUT="#292e42"
BUT2="#3b4261"

RED="#f776be"
GREEN="#9ece6a"
BLUE="#79a2f8"

OPEN=""
CLOSE=""
SEPARATOR=""
CIRCLE=""

set -g status-style bg=${BG},fg=${FG}

set -g status-left "\
#[bg=default,fg=${BUT}]${OPEN}\
#[bg=${BUT},fg=${FG}]#S\
#[bg=default,fg=${BUT}]${CLOSE}\
"

set -g status-right "\
#[bg=default,fg=${BUT}]${OPEN}\
#[bg=${BUT},fg=${FG}]#h\
#[bg=default,fg=${BUT}]${CLOSE}"

set -g window-status-format "\
#[bg=default,fg=${BUT2}]${OPEN}\
#[bg=${BUT2},fg=${FG}]#I \
#[bg=${BUT2},fg=${BUT}]${SEPARATOR}\
#[bg=${BUT},fg=${FG}]#W\
#[bg=default,fg=${BUT}]${CLOSE}"

set -g window-status-current-format "#I${SEPARATOR}#W"
set -g window-status-current-format "\
#[bg=default,fg=${FG}]${OPEN}\
#[bg=${FG},fg=${BUT}]#I \
#[bg=${FG},fg=${FG}]${SEPARATOR}\
#[bg=${FG},fg=${BUT}]#W\
#[bg=default,fg=${FG}]${CLOSE}"

# Tmux Plugin Manager
set -g @plugin "tmux-plugins/tpm"
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @mode_indicator_prefix_prompt "${CIRCLE}"
set -g @mode_indicator_copy_prompt "${CIRCLE}"
set -g @mode_indicator_sync_prompt "${CIRCLE}"
set -g @mode_indicator_empty_prompt "${CIRCLE}"
set -g @mode_indicator_prefix_mode_style "bg=default,fg=${RED}"
set -g @mode_indicator_copy_mode_style "bg=default,fg=${YELLOW}"
set -g @mode_indicator_sync_mode_style "bg=default,fg=${BLUE}"
set -g @mode_indicator_empty_mode_style "bg=default,fg=${GREEN}"

set -ga status-left "#{tmux_mode_indicator}"

set -g @vim_navigator_mapping_left "C-Left C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-Right C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"
set -g @vim_navigator_mapping_prev ""  # removes the C-\ binding

set -g @continuum-restore 'on'
set -g @continuum-boot-options 'ghostty,fullscreen'
set -g @resurrext-save 'S'
set -g @resurrext-restore 'E'

set -g @sessionx-bind 'C-o'
set -g @sessionx-prefix on
set -g @sessionx-fzf-builtin-tmux 'off'
set -g @sessionx-ls-command 'eza --tree --color=always --icons=always -a'
set -g @sessionx-zoxide-mode 'on'

set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "~/.config/tmux/plugins/tpm/tpm"
